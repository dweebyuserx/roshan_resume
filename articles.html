const CONFIG = {
  name: { first: "Roshan", last: "Abraham" },

  articles: [
    {
      date: "Feb 2026",

      title: "The End of Seeing is Believing: How to Prove Anything in the Age of Generative AI",

      tags: [{ text: "Blockchain", color: "c" }, { text: "Ethics", color: "p" }, { text: "GenAI", color: "o" }, { text: "Deepfakes", color: "g" }],
      body: `<p><em style="color:var(--muted)">"In an age where anyone can fake anything, how do we know what's real anymore? The answer might be simpler than you think — and it's already being built."</em></p><p><strong>The Day Reality Broke.</strong> In January 2026, civil rights attorney Nekima Levy Armstrong was arrested at a Minnesota protest. Original photos captured her looking perfectly calm. Shortly after, an altered deepfake surfaced — digitally contorting her face into hysterical tears. The forgery was so convincing that an official White House social media account shared it before anyone spotted the manipulation. The fabricated image went viral instantly. By the time forensic analysts debunked it, the lie had already outpaced the truth. The reputational damage was permanent.</p><p>A majority of people surveyed now report they can no longer reliably tell the difference between real and AI-generated content. <strong>The burden of proof has shifted: you're fake until proven real.</strong> This is unsustainable. This is dangerous. This is where we are.</p><p><strong>A Brief History of Fakery.</strong> Faking reality is nothing new — Stalin airbrushed enemies from photographs in the 1930s. But those forgeries required skill and left telltale signs. The Photoshop era raised the bar but forensic tools evolved to match. Then generative AI changed everything. In 2023, tools like Midjourney and DALL-E went mainstream. By 2025, anyone with a smartphone could generate photorealistic images indistinguishable from reality. The barrier to creating fakes collapsed. The barrier to detecting them skyrocketed. Deepfake fraud incidents grew <strong>900% annually</strong> — reaching 8 million files shared online by 2025.</p><p><strong>Why current solutions fail.</strong> Fact-checkers are overwhelmed — for every fake they debunk, a thousand more spread. Content moderation can't keep up with the volume; AI-generated fakes vastly outnumber human moderators. Digital watermarks (C2PA/Content Credentials) can be stripped — metadata doesn't survive a screenshot. And radical skepticism — "trust nothing" — leads to epistemic nihilism. Cynicism is not a solution. It's surrender.</p><figure style="margin:20px 0;border:1px solid var(--border);border-radius:4px;overflow:hidden"><img src="assets/verity-doc-correction.png" alt="Timeline of a document correction via Verity Protocol — showing IPFS version chain and blockchain anchoring" style="width:100%;display:block"></figure><p><strong>The VeriStasis Protocol.</strong> What if, from the moment a photo is taken or a document is created, we could establish an immutable, cryptographically verifiable record that proves <strong>when</strong> it was created, <strong>where</strong>, <strong>who</strong> created it, <strong>what</strong> device was used, <strong>every version</strong> forever, and <strong>why</strong> any changes were made? That infrastructure is being built right now.</p><p>The architecture chains five layers: <strong>(1) Origin capture</strong> — metadata (GPS, timestamp, device/session ID) is cryptographically bound to the content at creation. <strong>(2) IPFS storage</strong> — content is addressed by its hash (CID); change even one pixel and the CID changes completely, with no single point of failure across thousands of global nodes. <strong>(3) IPNS + Blockchain anchoring</strong> — a stable address pointer tracks all versions while the blockchain creates an immutable, timestamped lineage. <strong>(4) AI Validation Suite</strong> — deepfake detector, manipulation detector, AI-generation estimator, and session signature validator combine into a multi-dimensional authenticity score (not a binary "real/fake"). <strong>(5) Vector DB caching layer</strong> — distributed fast-query layer with self-healing: hash mismatches auto-trigger a source-of-truth check against the blockchain.</p><img src="assets/verity-selfheal-diagram.png" alt="The Self-Healing Vector Database Cluster — Step 3.5 Validation Flow"/><div class="img-caption">FIG. 1 — The self-healing VDB cluster: hash mismatches auto-trigger source-of-truth checks against the blockchain, restoring corrupted nodes automatically.</div><p><strong>Screenshots don't break the chain.</strong> A screenshot generates a new CID with its own metadata trail — device, session, timestamp. It cannot impersonate the original authenticated file. The system records the act of capture, not just the content.</p><figure style="margin:20px 0;border:1px solid var(--border);border-radius:4px;overflow:hidden"><img src="assets/verity-vdb-cluster.png" alt="The Self-Healing Vector Database Cluster — hash mismatch detection and auto-healing flow" style="width:100%;display:block"></figure><p><strong>Real-world use cases: Journalism</strong> — a photojournalist can prove her war-zone image was taken on her authenticated device, at that GPS location, before the article published, with only documented cropping. <strong>Legal evidence</strong> — police body cam footage has an ironclad chain of custody from capture to courtroom; neither side can claim tampering without breaking the cryptographic record. <strong>Healthcare</strong> — MRI machines certify device serial number, calibration status, and operator credentials alongside each scan. <strong>Government</strong> — official policy documents registered with timestamped digital signatures; any amendment is tracked with an explanation, publicly verifiable.</p><p><strong>Trust is maintained through transparency, not deletion.</strong> When you correct a typo in a caption, a new CID is generated, the old version stays in IPFS forever, and a ChainComment explains what changed and why. Both versions remain accessible. History cannot be rewritten.</p><img src="assets/verity-protocol-diagram.png" alt="Timeline of a Document Correction via Verity Protocol"/><div class="img-caption">FIG. 2 — Document correction timeline: original and corrected versions both preserved with immutable blockchain records and a permanent IPNS address pointer.</div><p><strong>The bigger picture.</strong> We are at a crossroads. Path 1: epistemic collapse — nothing is verifiable, truth becomes subjective, democracies and courts cease to function. Path 2: centralised truth arbiters — governments or mega-corporations become gatekeepers; history shows this always becomes propaganda. Path 3: <strong>decentralised verification</strong> — anyone can verify without a central authority, transparency without censorship, privacy without opacity. Trust built through cryptography, not institutional permission. This is the path forward.</p><p style="color:var(--cyan);font-size:12px">Read the full article on <a href="https://medium.com/ai-security-hub/the-end-of-seeing-is-believing-how-to-prove-anything-in-the-age-of-generative-ai-aca1a537aea6" target="_blank" rel="noopener noreferrer" style="color:var(--cyan)">Medium →</a></p><button class="article-close-btn" onclick="toggleArticle(event, this)">CLOSE ↑</button>`

  `).join('');

  `;

  // Re-observe new elements
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

function toggleArticle(e, closeBtn, idx) {
  // If triggered by close button inside card, don't re-toggle
  if (closeBtn) {
    e.stopPropagation();
    const card = closeBtn.closest('.article-card');
    card.querySelector('.article-body').classList.remove('open');
    card.classList.remove('expanded');
    return;
  }
  // Don't toggle if clicking on a tag or button
  if (e.target.closest('.atag') || e.target.closest('button')) return;
  const card = e.currentTarget;
  const body = card.querySelector('.article-body');
  const isOpen = body.classList.contains('open');
  // Close all others
  document.querySelectorAll('.article-card.expanded').forEach(c => {
    c.querySelector('.article-body').classList.remove('open');
    c.classList.remove('expanded');
  });
  if (!isOpen) {
    body.classList.add('open');
    card.classList.add('expanded');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }
}

// Filter logic
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filter = btn.dataset.filter;
  document.querySelectorAll('.article-card').forEach(card => {
    if (filter === 'all') {
      card.classList.remove('hidden');
    } else {
      const cats = card.dataset.categories || '';
      card.classList.toggle('hidden', !cats.split(',').includes(filter));
    }
  });
});

// Terminal streaming text
function typeStream(el, speed) {
  if (!el) return;
  speed = speed || 30;
  const finalHTML = el.innerHTML;
  const text = el.textContent;
  el.textContent = '';
  let i = 0;
  (function tick() {
    if (i < text.length) { el.textContent = text.slice(0, ++i); setTimeout(tick, speed); }
    else { el.innerHTML = finalHTML; }
  })();
}

// Cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
}
animRing();

function setupHovers() {
  document.querySelectorAll('a, button, .article-card').forEach(el => {
    el.addEventListener('mouseenter', () => {
      ring.style.width = '44px';
      ring.style.height = '44px';
      ring.style.borderColor = 'rgba(77,217,240,0.7)';
    });
    el.addEventListener('mouseleave', () => {
      ring.style.width = '28px';
      ring.style.height = '28px';
      ring.style.borderColor = 'rgba(77,217,240,0.4)';
    });
  });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('visible');
  });
}, { threshold: 0.1 });

window.addEventListener('load', () => {
  render();
  setupHovers();
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  typeStream(document.querySelector('.page-header h1'));
});
</script>
</body>
</html>
