<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.clarity.ms; connect-src 'self' https://cloudflareinsights.com https://www.clarity.ms; base-uri 'self'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>ROSHAN ABRAHAM BBS — PROJECTS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100;0,300;0,400;0,600;0,700;1,300&display=swap');
  :root {
    --bg:#0a0a0a; --bg2:#111111;
    --ansi-bright-green:#33da7a; --ansi-bright-cyan:#33c7de;
    --ansi-bright-yellow:#e9ad0c; --ansi-white:#d0cfcc;
    --ansi-bright-white:#f5f5f0; --ansi-green:#1a8c3f;
    --border-char:#2a3a2a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ansi-white);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;overflow-x:hidden;padding-top:68px;padding-bottom:40px;}

  #ticker-bar{position:fixed;top:0;left:0;right:0;height:28px;background:#000;border-bottom:1px solid var(--ansi-bright-green);overflow:hidden;z-index:1000;display:flex;align-items:center;}
  .ticker-inner{display:inline-block;white-space:nowrap;animation:ticker-scroll 60s linear infinite;color:var(--ansi-bright-green);font-size:12px;}
  @keyframes ticker-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  #nav-bar{position:fixed;top:28px;left:0;right:0;height:28px;background:var(--bg2);border-bottom:1px solid var(--border-char);display:flex;align-items:center;padding:0 12px;z-index:999;font-size:12px;}
  .nav-item{padding:0 10px;color:var(--ansi-white);cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;text-decoration:none;line-height:28px;border-left:1px solid var(--border-char);}
  .nav-item:first-child{border-left:none;}
  .nav-item.active{background:var(--ansi-bright-white);color:#000;}
  .nav-item:hover:not(.active){color:var(--ansi-bright-green);}

  #status-bar{position:fixed;bottom:0;left:0;right:0;height:28px;background:#000;border-top:1px solid var(--border-char);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--ansi-white);z-index:1000;gap:24px;}
  .status-online{color:var(--ansi-bright-green);}
  .status-right{margin-left:auto;color:var(--ansi-bright-cyan);}

  .main{max-width:980px;margin:0 auto;padding:24px 20px;}
  .section-header{color:var(--ansi-bright-green);margin-bottom:16px;}
  .section-header h1{font-size:13px;font-weight:700;}
  .prompt{color:var(--ansi-white);margin-top:4px;font-size:12px;}

  .ls-table{width:100%;border-collapse:collapse;font-size:12px;}
  .ls-table th{text-align:left;color:var(--ansi-bright-cyan);padding:4px 8px;border-bottom:1px solid var(--border-char);font-size:11px;}
  .ls-row{cursor:pointer;}
  .ls-row:hover td{background:var(--bg2);}
  .ls-row td{padding:5px 8px;border-bottom:1px solid #161616;vertical-align:middle;}
  .ls-row td.perms{color:#3a5a3a;font-size:11px;}
  .ls-row td.owner{color:#4a6a4a;font-size:11px;}
  .ls-row td.date-col{color:#4a4a4a;font-size:11px;}
  .ls-row td.name{color:var(--ansi-bright-cyan);font-weight:600;}
  .ls-row.featured td.name{color:var(--ansi-bright-yellow);}
  .ls-row td.badge{color:var(--ansi-bright-yellow);font-size:11px;}

  .sub-row td{padding:3px 8px;background:#0d0d0d;font-size:11px;color:#3a5a3a;border-bottom:1px solid #111;}
  .sub-row td.sub-name{color:var(--ansi-bright-green);padding-left:40px;}

  .readme-panel{overflow:hidden;max-height:0;transition:max-height 0.35s ease;}
  .readme-panel.open{max-height:600px;}
  .readme-inner{padding:16px 20px;border:1px solid var(--border-char);border-top:none;background:var(--bg2);font-size:12px;line-height:1.8;}
  .readme-cmd{color:var(--ansi-bright-cyan);margin-bottom:10px;font-weight:700;}
  .readme-desc{color:var(--ansi-white);margin-bottom:12px;}
  .tech-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .tech-tag{border:1px solid var(--border-char);color:var(--ansi-bright-green);padding:2px 8px;font-size:11px;}
  .readme-meta{font-size:11px;color:#5a5a5a;margin-bottom:10px;}
  .readme-meta span{color:var(--ansi-white);}
  .readme-links{display:flex;gap:16px;}
  .readme-link{color:var(--ansi-bright-cyan);text-decoration:none;}
  .readme-link:hover{color:var(--ansi-bright-yellow);}

  @media(max-width:600px){
    .ls-table th:nth-child(1),.ls-row td:nth-child(1),
    .ls-table th:nth-child(2),.ls-row td:nth-child(2),
    .ls-table th:nth-child(3),.ls-row td:nth-child(3),
    .ls-table th:nth-child(4),.ls-row td:nth-child(4){display:none;}
  }
</style>
</head>
<body>

<div id="ticker-bar"><div class="ticker-inner" id="ticker-text"></div></div>

<div id="nav-bar">
  <a class="nav-item" href="index.html">[1] HOME</a>
  <a class="nav-item" href="about.html">[2] ABOUT</a>
  <a class="nav-item active" href="projects.html">[3] PROJECTS</a>
  <a class="nav-item" href="articles.html">[4] ARTICLES</a>
  <a class="nav-item" href="connect.html">[5] CONNECT</a>
</div>

<div id="status-bar">
  <span class="status-online">● ONLINE</span>
  <span id="clock">00:00:00</span>
  <span class="status-right">roshan.dev BBS</span>
</div>

<div class="main">
  <div class="section-header">
    <h1>┌──[ ~/projects/ ]─────────────────────────────────────────────────┐</h1>
    <div class="prompt">$ ls -la ~/projects/&nbsp;&nbsp;&nbsp;# 11 entries — click any row to cat README.md</div>
  </div>

  <table class="ls-table">
    <thead>
      <tr>
        <th>PERMISSIONS</th>
        <th>OWNER</th>
        <th>GROUP</th>
        <th>DATE</th>
        <th>NAME</th>
        <th>NOTE</th>
      </tr>
    </thead>
    <tbody id="ls-body"></tbody>
  </table>
</div>

<script>
const TICKER_MSGS=['★ ROSHAN ABRAHAM BBS v2.6 — WELCOME, USER','★ AI SOLUTIONS CONSULTANT @ DELOITTE USI','★ AI HACKATHON WINNER — AGENTIC PR PLATFORM','★ AVAILABLE FOR WORK — CONSULTING & FULL-TIME','★ 5+ YEARS BUILDING PRODUCTION AI SYSTEMS','★ PRESS ESC×3 FOR SNAKE.EXE'];
const tEl=document.getElementById('ticker-text');
const full=TICKER_MSGS.join('          ');
tEl.textContent=full+'          '+full;

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString();},1000);

document.addEventListener('keydown',e=>{
  const pages=['index.html','about.html','projects.html','articles.html','connect.html'];
  const n=parseInt(e.key);
  if(n>=1&&n<=5)window.location.href=pages[n-1];
});

const PROJECTS=[
  {id:'agentic-pr-platform',name:'agentic-pr-platform/',date:'2025-01',group:'deloitte',featured:true,badge:'★ AI HACKATHON WINNER',
   title:'Agentic PR Platform',desc:'Multi-agent orchestration platform with specialized routers, chain-of-thought reasoning, and tool integration for enterprise State Govt deployments at Deloitte USI.',
   tech:['ADK','Gemma/Claude','Vertex AI','Firebase','MCP'],meta:'STATUS: PRODUCTION  |  EMPLOYER: Deloitte USI  |  AWARD: AI Hackathon Winner',
   link:'https://github.com/dweebyuserx'},
  {id:'medical-ai',name:'medical-ai-infrastructure/',date:'2023-06',group:'mydigirecords',
   title:'Medical AI Infrastructure',desc:'Document OCR engine with NER parser for medical documents. FHIR translation and LLM-powered knowledge base. EPIC and Cerner integration.',
   tech:['Document AI','FHIR','NER','GCP','ML pipeline'],meta:'STATUS: PRODUCTION  |  EMPLOYER: MyDiGiRecords',
   link:'https://github.com/dweebyuserx'},
  {id:'rag-systems',name:'rag-systems/',date:'2024-01',group:'appsynergy',multi:true,badge:'[v1 v2 v3 v4]',
   title:'Advanced RAG Systems',desc:'Four RAG builds of increasing caliber. From basic retrieval to multi-agent orchestration with specialized routers, hybrid search with re-ranking, and full RAGAS evaluation.',
   tech:['Weaviate','Milvus','ADK','RAGAS','DSPy','Redis'],
   variants:['v1-basic-retrieval/','v2-hybrid-search/','v3-multi-agent/','v4-production-ragas/'],
   meta:'STATUS: MULTIPLE BUILDS  |  COUNT: v1–v4',link:'https://github.com/dweebyuserx'},
  {id:'custom-llm-foundry',name:'custom-llm-foundry/',date:'2024-03',group:'personal',
   title:'Custom LLM Foundry',desc:'LLM fine-tuning pipeline with custom data collection, instruction tuning, and registry management. W&B evaluation and benchmarking. Public artifact on HuggingFace @dweebster.',
   tech:['Gemma/Qwen2.5','vLLM/Unsloth','W&B/HF','Docker/RunPod','DSPy'],
   meta:'STATUS: PUBLIC  |  HF: huggingface.co/dweebster',link:'https://huggingface.co/dweebster'},
  {id:'mlops-engine',name:'mlops-engine/',date:'2023-08',group:'appsynergy',
   title:'MLOps Engine',desc:'Dynamic model trainer and evaluator using BigQuery. Scheduled model comparison and retraining pipeline for classification and regression models.',
   tech:['BigQuery','Model registry'],meta:'STATUS: PRODUCTION',link:'https://github.com/dweebyuserx'},
  {id:'disease-detection',name:'disease-detection-cattle/',date:'2022-11',group:'appsynergy',
   title:'Disease Detection in Cattle',desc:'Schedule-driven CCTV cattle monitoring. TFX serving endpoints for seasonal disease classification. Ear tag OCR + Zapier alerts sent to rancher.',
   tech:['TFX','Serverless','Zapier','Model registry'],meta:'STATUS: DEPLOYED',link:'https://github.com/dweebyuserx'},
  {id:'stable-diffusion',name:'stable-diffusion-pipeline/',date:'2023-03',group:'personal',
   title:'Stable Diffusion Pipeline',desc:'Generative AI pipeline for visual content creation with custom workflow automation and ComfyUI integration.',
   tech:['Stable Diffusion','Python','ComfyUI'],meta:'STATUS: PERSONAL',link:'https://github.com/dweebyuserx'},
  {id:'claude-agent-code',name:'claude-agent-code-conversion/',date:'2024-09',group:'personal',
   title:'Claude Agent Code Conversion',desc:'Multi-agent system for automated code conversion, dynamic test generation, and structured reporting. Engineered for minimal token consumption via aggressive prompt caching.',
   tech:['Claude Agent SDK','Anthropic API','MCP','prompt caching'],meta:'STATUS: ACTIVE',link:'https://github.com/dweebyuserx'},
  {id:'education-pipeline',name:'education-data-pipeline/',date:'2024-06',group:'personal',
   title:'Education Data Pipeline',desc:'Transforms raw educational content into student-profile-adapted learning material. KT reports benchmarked against WHO psychological development standards.',
   tech:['ADK','LLM openrouter','Redis RAG','WHO standards'],meta:'STATUS: ACTIVE',link:'https://github.com/dweebyuserx'},
  {id:'instore-nav',name:'in-store-navigation-ai/',date:'2023-11',group:'appsynergy',
   title:'In-Store Navigation AI',desc:'Conversational AI for physical store layouts modeled as graphs using NetworkX. Natural-language navigation, aisle-level routing, contextual product discovery.',
   tech:['NetworkX','conversational AI','graph traversal','Claude'],meta:'STATUS: PROTOTYPE',link:'https://github.com/dweebyuserx'},
  {id:'chatbot-systems',name:'chatbot-systems/',date:'2021-01',group:'appsynergy',multi:true,badge:'[v1 v2 v3]',
   title:'ChatBot Systems',desc:'Three chatbot applications shipped: RASA (rule-based) → Dialogflow (intent-based) → LLM-backed RAG (production-grade).',
   tech:['LangChain','Redis','FastAPI','Docker','RASA','Ollama'],
   variants:['v1-rasa/','v2-dialogflow/','v3-llm-rag/'],
   meta:'STATUS: MULTIPLE BUILDS  |  COUNT: v1–v3',link:'https://github.com/dweebyuserx'},
];

const tbody=document.getElementById('ls-body');
let openId=null;

PROJECTS.forEach(p=>{
  // Main row
  const row=document.createElement('tr');
  row.className='ls-row'+(p.featured?' featured':'');
  row.innerHTML=`<td class="perms">drwxr-xr-x</td><td class="owner">roshan</td><td class="owner">${p.group}</td><td class="date-col">${p.date}</td><td class="name">${p.name}</td><td class="badge">${p.badge||''}</td>`;
  tbody.appendChild(row);

  // Sub-entries for multi-variant projects
  if(p.variants){
    p.variants.forEach((v,i)=>{
      const sub=document.createElement('tr');
      sub.className='sub-row';
      sub.style.display='none';
      sub.dataset.parent=p.id;
      const prefix=i<p.variants.length-1?'├──':'└──';
      sub.innerHTML=`<td></td><td></td><td></td><td></td><td class="sub-name">${prefix} ${v}</td><td></td>`;
      tbody.appendChild(sub);
    });
  }

  // README panel row
  const panelRow=document.createElement('tr');
  const panelCell=document.createElement('td');
  panelCell.colSpan=6;
  panelCell.style.padding='0';
  const panel=document.createElement('div');
  panel.className='readme-panel';
  panel.id='readme-'+p.id;
  panel.innerHTML=`<div class="readme-inner">
    <div class="readme-cmd">$ cat ${p.name}README.md</div>
    <div class="readme-desc">${p.desc}</div>
    <div class="tech-row">${p.tech.map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>
    <div class="readme-meta">${p.meta}</div>
    <div class="readme-links">
      <a class="readme-link" href="${p.link}" target="_blank">[→ github.com/dweebyuserx]</a>
      <a class="readme-link" href="connect.html">[→ CONTACT FOR DEMO]</a>
    </div>
  </div>`;
  panelCell.appendChild(panel);
  panelRow.appendChild(panelCell);
  tbody.appendChild(panelRow);

  row.addEventListener('click',()=>{
    const wasOpen=openId===p.id;
    // Close all
    document.querySelectorAll('.readme-panel').forEach(pp=>pp.classList.remove('open'));
    document.querySelectorAll('.sub-row').forEach(sr=>sr.style.display='none');
    openId=null;
    if(!wasOpen){
      panel.classList.add('open');
      openId=p.id;
      if(p.variants){
        document.querySelectorAll('.sub-row[data-parent="'+p.id+'"]').forEach(sr=>sr.style.display='');
      }
    }
  });
});
</script>

</body>
